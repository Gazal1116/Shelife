<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="css/profilepage.css">
</head>
<body>
    <div class="profile-container">
        <h1>User Profile</h1>
        <div class="tabs">
            <button class="tab-button" onclick="openTab('account')">Account</button>
            <button class="tab-button" onclick="openTab('password')">Password</button>
            <button class="tab-button" onclick="openTab('security')">Security</button>
            <button class="tab-button" onclick="openTab('notifications')">Notifications</button>
            <button class="tab-button" onclick="openTab('settings')">Settings</button>
        </div>

        <div class="tab-content" id="account">
            <h2>Account Information</h2>
            <form>
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" placeholder="First name" name="first-name" required>
                
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" placeholder="Last name" name="last-name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email" name="email" required>
                
                <label for="address">Address:</label>
                <input type="text" id="address" placeholder="Address" name="address">
                
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" placeholder="Phone number" name="phone">
                
                <button type="submit">Save Changes</button>
            </form>
        </div>

        <div class="tab-content" id="password" style="display:none;">
            <h2>Password Settings</h2>
            <form>
                <label for="current-password">Current Password:</label>
                <input type="password" id="current-password" name="current-password" required>
                
                <label for="new-password">New Password:</label>
                <input type="password" id="new-password" name="new-password" required>
                
                <label for="confirm-password">Confirm New Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
                
                <button type="submit">Change Password</button>
            </form>
        </div>

        <div class="tab-content" id="security" style="display:none;">
            <h2>Security Settings</h2>
            <form>
                <label for="two-factor">Enable Two-Factor Authentication:</label>
                <input type="checkbox" id="two-factor" name="two-factor">
                
                <button type="submit">Update Security Settings</button>
            </form>
        </div>

        <div class="tab-content" id="notifications" style="display:none;">
            <h2>Notification Settings</h2>
            <form>
                <label for="email-notifications">Email Notifications:</label>
                <input type="checkbox" id="email-notifications" name="email-notifications" checked>
                
                <label for="sms-notifications">SMS Notifications:</label>
                <input type="checkbox" id="sms-notifications" name="sms-notifications">
                
                <button type="submit">Save Notification Preferences</button>
            </form>
        </div>

        <div class="tab-content" id="settings" style="display:none;">
            <h2>General Settings</h2>
            <form>
                <label for="language">Preferred Language:</label>
                <select id="language" name="language">
                    <option value="english">English</option>
                    <option value="spanish">Spanish</option>
                    <option value="french">French</option>
                </select>
                
                <label for="timezone">Timezone:</label>
                <select id="timezone" name="timezone">
                    <option value="utc">UTC</option>
                    <option value="pst">PST</option>
                    <option value="est">EST</option>
                </select>
                
                <button type="submit">Save Settings</button>
            </form>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.style.display = 'none'; 
            });
            document.getElementById(tabName).style.display = 'block'; 
        }
    </script>
</body>
</html>
