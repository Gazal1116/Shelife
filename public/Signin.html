<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="css/signin.css">
</head>
<body>
    <div class="container">
        <h1>Shelf-life</h1><hr style="size:5; width:125px;">
        <h2>Sign In</h2>

        <form id="signInForm" action="homepage.html" method="GET" onsubmit="return validateForm()">
            <div>
                <input type="text" placeholder="First name" name="firstName" required>
            </div>
            <br>
            <div>
                <input type="text" placeholder="Last name" name="lastName" required>
            </div>
            <br>
            <div>
                <input type="email" placeholder="Email" name="email" maxlength="50" required>
            </div>
            <br>
            <div>
                <input type="password" placeholder="Password" name="pwd" required>
            </div>
            <br>
            <div>
                <input type="password" placeholder="Confirm password" name="confirmPwd" required>
            </div>
            <br>
            <button type="submit" >Sign in</button>
        </form>
        <br>
        <p>Already have an Account? <a href="login.html">login</a></p>
    </div>

    <script>
        function validateForm() {
            var password = document.getElementsByName("pwd")[0].value;
            var confirmPassword = document.getElementsByName("confirmPwd")[0].value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return false; 
            }
            return true;
        }
    </script>
</body>
</html>
